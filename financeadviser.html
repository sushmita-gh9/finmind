<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinMind — AI Finance Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #2979ff;
    --accent2: #00b0ff;
    --danger: #ff1744;
    --warn: #ffab00;
    --text: #e8eaf6;
    --muted: #5c6080;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(41,121,255,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,176,255,0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease both;
    box-shadow: 0 2px 24px rgba(0,0,0,0.4);
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Form */
  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(41,121,255,0.15);
  }

  input::placeholder { color: var(--muted); }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 600px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* Expense rows */
  .expense-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }

  .expense-row input { margin: 0; }

  .expense-row input.amount {
    width: 110px;
  }

  .btn-remove {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 10px 12px;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

  .btn-add {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    padding: 12px;
    width: 100%;
    font-family: var(--font-mono);
    font-size: 13px;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* Analyze button */
  .btn-analyze {
    width: 100%;
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 17px;
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-analyze:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(41,121,255,0.45);
  }

  .btn-analyze:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
    animation: fadeUp 0.4s ease both;
  }

  .loading.show { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  /* Result */
  .result {
    display: none;
    animation: fadeUp 0.5s ease both;
  }
  .result.show { display: block; }

  /* Summary pills */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }

  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .pill-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .pill-value {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 700;
  }

  .pill-value.green { color: var(--accent); }
  .pill-value.red { color: var(--danger); }
  .pill-value.purple { color: var(--accent2); }

  /* AI Analysis text */
  .analysis-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .analysis-box h3 {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0 8px;
  }

  .analysis-box h3:first-child { margin-top: 0; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }

  /* Reset */
  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    padding: 12px 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    transition: all 0.2s;
    margin-top: 16px;
    width: 100%;
  }
  .btn-reset:hover { border-color: var(--text); color: var(--text); }

  .tag {
    display: inline-block;
    background: rgba(41,121,255,0.15);
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">FinMind</div>
    <h1>Your <span>AI Finance</span><br>Advisor</h1>
    <p class="subtitle">Enter your income & expenses. Get brutally honest advice.</p>
  </header>

  <div class="card" style="margin-bottom:20px;animation:fadeUp 0.5s ease both;">
    <div class="card-title">Your Groq API Key</div>
    <div class="field">
      <label>Paste your key from console.groq.com — stays only in your browser</label>
      <input type="password" id="apiKeyInput" placeholder="gsk_...">
    </div>
  </div>

  <!-- Input Form -->
  <div id="formSection">
    <div class="card delay-1">
      <div class="card-title">Income</div>
      <div class="grid-2">
        <div class="field">
          <label>Monthly Income (₹)</label>
          <input type="number" id="income" placeholder="e.g. 50000" min="0">
        </div>
        <div class="field">
          <label>Currency</label>
          <input type="text" id="currency" value="INR (₹)" readonly style="cursor:default; color: var(--muted);">
        </div>
      </div>
    </div>

    <div class="card delay-2">
      <div class="card-title">Monthly Expenses</div>
      <div id="expenseList">
        <div class="expense-row">
          <input type="text" placeholder="Category (e.g. Rent)" class="exp-name">
          <input type="number" placeholder="₹ Amount" class="exp-amount amount" min="0">
          <button class="btn-remove" onclick="removeExpense(this)">✕</button>
        </div>
        <div class="expense-row">
          <input type="text" placeholder="Category (e.g. Food)" class="exp-name">
          <input type="number" placeholder="₹ Amount" class="exp-amount amount" min="0">
          <button class="btn-remove" onclick="removeExpense(this)">✕</button>
        </div>
        <div class="expense-row">
          <input type="text" placeholder="Category (e.g. Transport)" class="exp-name">
          <input type="number" placeholder="₹ Amount" class="exp-amount amount" min="0">
          <button class="btn-remove" onclick="removeExpense(this)">✕</button>
        </div>
      </div>
      <button class="btn-add" onclick="addExpense()">+ Add expense</button>
    </div>

    <div class="card delay-3">
      <div class="card-title">Goals <span class="tag">optional</span></div>
      <div class="field">
        <label>What do you want to achieve financially?</label>
        <input type="text" id="goals" placeholder="e.g. Save for a laptop, travel to Goa, build emergency fund">
      </div>
    </div>

    <button class="btn-analyze delay-4" onclick="analyze()">→ Analyze My Finances</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Crunching your numbers with AI...
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="card">
      <div class="card-title">Summary</div>
      <div class="summary-grid">
        <div class="pill">
          <div class="pill-label">Income</div>
          <div class="pill-value purple" id="r-income">—</div>
        </div>
        <div class="pill">
          <div class="pill-label">Expenses</div>
          <div class="pill-value red" id="r-expenses">—</div>
        </div>
        <div class="pill">
          <div class="pill-label">Savings</div>
          <div class="pill-value green" id="r-savings">—</div>
        </div>
      </div>
      <div class="analysis-box" id="analysisText">...</div>
    </div>
    <button class="btn-reset" onclick="reset()">← Start Over</button>
  </div>

</div>

<script>
  function addExpense() {
    const list = document.getElementById('expenseList');
    const row = document.createElement('div');
    row.className = 'expense-row';
    row.innerHTML = `
      <input type="text" placeholder="Category" class="exp-name">
      <input type="number" placeholder="₹ Amount" class="exp-amount amount" min="0">
      <button class="btn-remove" onclick="removeExpense(this)">✕</button>
    `;
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function removeExpense(btn) {
    const rows = document.querySelectorAll('.expense-row');
    if (rows.length > 1) btn.parentElement.remove();
  }

  function fmt(n) {
    return '₹' + Number(n).toLocaleString('en-IN');
  }

  async function analyze() {
    const income = parseFloat(document.getElementById('income').value) || 0;
    const goals = document.getElementById('goals').value.trim();

    const names = document.querySelectorAll('.exp-name');
    const amounts = document.querySelectorAll('.exp-amount');

    let expenses = [];
    let totalExpenses = 0;

    names.forEach((n, i) => {
      const name = n.value.trim();
      const amt = parseFloat(amounts[i].value) || 0;
      if (name && amt > 0) {
        expenses.push({ category: name, amount: amt });
        totalExpenses += amt;
      }
    });

    if (income === 0) { alert('Please enter your monthly income.'); return; }
    if (expenses.length === 0) { alert('Please add at least one expense.'); return; }

    const savings = income - totalExpenses;

    // Show loading
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('loading').classList.add('show');

    const expenseText = expenses.map(e => `- ${e.category}: ₹${e.amount.toLocaleString('en-IN')}`).join('\n');
    const prompt = `You are a sharp, honest, and supportive personal finance advisor for someone in India.

Here is their financial data:
Monthly Income: ₹${income.toLocaleString('en-IN')}
Monthly Expenses:
${expenseText}
Total Expenses: ₹${totalExpenses.toLocaleString('en-IN')}
Monthly Savings: ₹${savings.toLocaleString('en-IN')}
${goals ? `Financial Goals: ${goals}` : ''}

Give a clear, honest analysis. Structure your response with these sections using plain text headers (no markdown, no bullet symbols, use simple dashes for lists):

VERDICT
One punchy sentence on their financial health.

WHERE THE MONEY IS GOING
Identify which expense is eating the most. Be direct.

THE PROBLEM
What's the biggest issue you see? Be honest but kind.

WHAT TO FIX (3 STEPS)
Give exactly 3 concrete, specific actions they can take THIS MONTH.

SAVINGS TARGET
Based on their income, what should they realistically save? Give a number.

${goals ? 'GOAL CHECK\nCan they achieve their goal? When? Be specific.' : ''}

Keep it under 280 words. Be like a smart friend, not a boring bank advisor. Use simple English.`;

    try {
      const GROQ_API_KEY = document.getElementById("apiKeyInput")?.value?.trim() || "";
      if (!GROQ_API_KEY) { alert("Please enter your Groq API key!"); document.getElementById("loading").classList.remove("show"); document.getElementById("formSection").style.display="block"; return; }
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
        body: JSON.stringify({
          model: "llama3-70b-8192",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.choices?.[0]?.message?.content || "Could not generate analysis. Please try again.";

      // Format nicely
      const formatted = text
        .replace(/^(VERDICT|WHERE THE MONEY IS GOING|THE PROBLEM|WHAT TO FIX.*|SAVINGS TARGET|GOAL CHECK)/gm, '<h3>$1</h3>');

      document.getElementById('r-income').textContent = fmt(income);
      document.getElementById('r-expenses').textContent = fmt(totalExpenses);
      document.getElementById('r-savings').textContent = fmt(savings);
      document.getElementById('r-savings').className = 'pill-value ' + (savings >= 0 ? 'green' : 'red');
      document.getElementById('analysisText').innerHTML = formatted;

      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');

    } catch (err) {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('formSection').style.display = 'block';
      alert('Something went wrong. Please try again.');
    }
  }

  function reset() {
    document.getElementById('result').classList.remove('show');
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('income').value = '';
    document.getElementById('goals').value = '';
    document.getElementById('expenseList').innerHTML = `
      <div class="expense-row">
        <input type="text" placeholder="Category (e.g. Rent)" class="exp-name">
        <input type="number" placeholder="₹ Amount" class="exp-amount amount" min="0">
        <button class="btn-remove" onclick="removeExpense(this)">✕</button>
      </div>`;
  }
</script>
</body>
</html>
